l_english:
 # === Events: dynamic overlord flavor (Belgium <-> the Netherlands) ===
 ww_congo.1.t: "[CONGO_GetOverlordNameDefCap] Invests into our Development"
 ww_congo.1.desc: "The [CONGO_GetOverlordAdjective] colonial office has today passed a bill to allocate much larger amounts of resources to our industrial development, and have begun construction of industrial facilities in [295.GetName]."
 ww_congo.6.t: "The [CONGO_GetOverlordAdjective]s Reject our Food Production Scheme"
 ww_congo.6.desc: "The colonial administration back in [CONGO_GetOverlordNameDef] has denied our request to increase food production by reducing mining production with the goal of 'improving the social conditions of the colonial population'."
 ww_congo.7.t: "The [CONGO_GetOverlordAdjective]s Approve our Food Production Scheme"
 ww_congo.7.desc: "The colonial administration back in [CONGO_GetOverlordNameDef] has approved our request to increase food production by reducing mining production with the goal of 'improving the social conditions of the colonial population'."
 ww_congo.17.d: "Following approval by the [CONGO_GetOverlordAdjective] authorities in the state, the new [COG.GetAdjective] Prime Minister Patrice Lumumba held a short speech to celebrate the newfound independence of his country. In it lies outspoken criticism of colonialism, and the so called "[CONGO_GetOverlordAdjective] civilizing mission". Though this was received positively within the nation, many outside the country have interpreted it as a personal attack against the [CONGO_GetOverlordAdjective] Head of State. The era of decolonization has only just begun!"
 ww_congo.18.d: "Recently, the Free Congolese government in Stanleyville attempted secession from the [CONGO_GetOverlordAdjective] colonial empire. Though having great support in the nation, their rebellion was swiftly crushed by troops loyal to [CONGO_GetOverlordName] and foreign mercenaries alike."
 ww_congo.19.d: "Recently, the Free Congolese government in Stanleyville started a war of independence from the [CONGO_GetOverlordAdjective] colonial empire. Though it took some time, their rebellion was eventually able to overrun the colonial troops stationed in the area and capture the key cities in the Congo. Now, they have officially declared independence, and a peace agreement has been sought between them and their former oppressors.."
 ww_congo.27.desc: "Earlier this week, Congolese non-commissioned officers led by First Sergeant-Major Ngoie Mukalabushi mutinied at Luluabourg in Kasaï province. One of the main triggers seems to have been their treatment by our [CONGO_GetOverlordAdjective] officers. The mutineers broke into the base's armory on the morning and pillaged the white quarter of the town. They also attacked visible signs of the colonial authorities and proclaimed their desire for independence. They then dispersed to their home villages, pillaging on the way, but seem to have failed to spread the insurrection to neighboring garrisons. How should we deal with the situation?"
 ww_congo.29.desc: "Congolese nationalists dubbing themselves the National Committee for Liberation are preparing a war of independence against their overlord. They promise us that they would align closer to us once the war has been won, provided we send them weapons when the fighting starts, and claim that a weakened [CONGO_GetOverlordName] lies within our interests."
 COG_coquilatville_and_lusambo_will_join_the_belgian_loyalsits_tt: "§Y[538.GetName]§! and §Y[888.GetName]§! will join the §YPro-[CONGO_GetOverlordAdjective] Loyalists§! when the war for independence starts"
 congolese_civil_war_starting_congo_side_tt: "The [CONGO_GetOverlordAdjective] Loyalists will initiate a civil war against us. We will be able to force peace with our former overlords and gain full independence if we control §YLéopoldville§!, §YÉlisabethville§! and §YStanleyville§!. \n\nSimilarly, they will be able to force peace with us and retain control over our country by controlling §YLéopoldville§!, §YÉlisabethville§! and §YStanleyville§!."
 congo_independence_struggle.1.d: "Ever since our continent was divided by up among the Europeans, we have yearned for freedom, and the ability to carve our own future. Our own past as [CONGO_GetOverlordNameDefCap]'s colony has been colored by exploitation and dehumanization, but we were always kept under foot by our own disunity and their superior firepower. \n\nSeditious whispers have been heard in the streets and jungles once more, as our people put voice to their dreams to have a Congo free of colonial interference. A Congo free to legislate and enforce their own laws, a Congo free to profit from their own hard work, a Congo free to shape their own future."
 congo_independence_struggle.2.d: "We have just been approached by a group claiming to represent the independence movement of our colonial subject, [COG.GetNameDef]. Although the colonial administration there has been aware of rising independence sentiment for some time, the audacity of actually asking for it has taken them somewhat by surprise. They caution us that there is widespread local support towards achieving this goal of a free and independent nation, and that should we choose to react too harshly that this may lead towards violence and possibly even war. \n\nWe must also consider our global commitments and prestige. As such, the most diplomatic offer would be to allow them to join us as equal partners in a [CONGO_GetOverlordAdjective] Commonwealth. \n\nAlternatively, a significant portion of our wealth is derived from that territory, and our finances would be exceptionally hard hit by their loss. We could ask them to pay us for their freedom- at quite a high price. \n\nFinally, we can simply say no, and mobilize our forces as a warning against any potential uprising. "
 congo_independence_struggle.3.d: "We have received word from [CONGO_GetOverlordName], and they have acknowledged that the day of colonial empires is fast coming to a close. They have therefore extended an offer to us to join the [CONGO_GetOverlordAdjective] Commonwealth as free and independent nation, and therefore as an equal partner. We would still be beholden to the same terms offered to any other military ally, and therefore would be expected to join any wars together. \n\nThis is probably the most diplomatic outcome we could hope for, and this would allow us to entirely avoid bloodshed with our European friends while upholding African pride and independence."
 congo_independence_struggle.4.d: "We have received word from [CONGO_GetOverlordName], and they have put a literal price on our independence. They remind us of the significant outlay of capital that they invested into our nation, ranging from the laying of considerable lengths of track, development of mining capabilities and general expansion of infrastructure. \n\nAt the time this was claimed to be a part of their responsibility towards us as the colonial overlord, and was simply a part of the process of civilizing the nation. Now however, they hold this over our heads as collateral designed to retain our ongoing loyalty through economic dependence. \n\nThe asking price is not unattainable, but it is extremely high and will beggar our nation for the short term, and leave us beholden to them through debt for a much longer period after. The question now, this is worth the price of independence, or should it be paid in blood?"
 congo_independence_struggle.5.d: "We have just received word from the new ambassador from [COG.GetName], announcing that they have accepted the offer for independence from [CONGO_GetOverlordAdjective] colonial rule in exchange for joining the [CONGO_GetOverlordAdjective] Commonwealth as a full and equal member. Now the work begins extracting the administration from the Colonial Office and instead ascribing this responsibility to their new government instead."
 congo_independence_struggle.8.d: "[CONGO_GetOverlordNameDefCap] seems to think we are incapable of seizing independence from them through force, and have called our bluff. They have offered us the "opportunity" to become an overseas department, essentially making us an extension of their nation with rights to citizenship but without the autonomy to forge our own future. They might be right that we lack the military strength to oppose this, however the choice is ultimately ours."
 congo_independence_struggle.11.d: "As per the agreement with [CONGO_GetOverlordName], we broke ground this morning to begin construction on the new government building to house the Dominion Parliament. The next step will be to begin the process of writing our constitution, and calling the first election. From these humble beginnings we can begin to shape the future political identity of this nation."
 congo_independence_struggle.12.d: "In a shock move, [CONGO_GetOverlordName] has decided to rescind their offer of forming a Dominion! We are not entirely sure what has caused this shift in attitude, perhaps after backing down once, the colonizer is doing what they do best, and exploiting the situation. We must decide our own reaction to this affront."
 congo_independence_struggle.17.d: "This morning we received by radio a hastily put together report from the Colonial Governor of [COG.GetNameDef]. He claimed that a mob had entered his official residence, pacified the guards with foreign-made weapons and delivered into his hands a declaration of independence. They then promptly left. Most alarmingly, it was indicated that this mob was lead by elements of the Force Publique, the gendarme charged with maintaining order. \n\nThe declaration called for the immediate withdrawal of the Colonial administration, and the subsequent handing over of legitimate power to the civilian government to be formed from the leadership of this rebellion. We can be under no illusions that the risk is real, and the fact that this mob was armed by weapons not of [CONGO_GetOverlordAdjective] design which could suggest that foreign entities have taken a direct interest, and might militarily support the rebels."
 congo_independence_struggle.18.d: "It would seem that our ultimatum was treated with the proper amount of seriousness by our overlord, because today we received the signed writ of independence from the Colonial Administration. Already plans are underway for the official lowering of the [CONGO_GetOverlordAdjective] flag, and with it the peaceful transfer of power to our new regime. Although our primary goal has been achieved, the real work of forming a government now begins. We have much to do, an economy to develop, relations with other nations to normalize, and of course certain debts to repay to those who supported us in achieving this dream."
 congo_independence_struggle.19.d: "We have reports that [CONGO_GetOverlordAdjective] troops have begun to mobilize in Léopoldville, and a crack down on disloyal elements throughout the Force Publique. Despite our best efforts to cow the [CONGO_GetOverlordAdjective] government into submission, and achieve our goal of independence without bloodshed, the colonial powers have opted to retain power the only way they know how- through force. Our window of opportunity is closing  quickly, and we must decide whether to give the word for our supporters to rise or to stand down before things escalate beyond our control."
 congo_independence_struggle.22.d: "We have received word from a much chastised delegation from [COG.GetNameDef], that they have decided to accept their place as an Overseas Department of [CONGO_GetOverlordName]. Our citizenship and tax offices have begun drafting the documentation for the proper integration of these new citizens into our system, and the Colonial Office has begun to draft up a new system of local government more closely following along [CONGO_GetOverlordAdjective] lines."
 congo_independence_struggle.23.d: "Our meeting with the [CONGO_GetOverlordName] diplomats has borne fruit, and it seems that they still wish to follow a diplomatic path. They have offered us increased autonomy as a Dominion, similar to the British model. We would still need to follow [CONGO_GetOverlordAdjective] diplomacy, however, we would have significantly more rights to govern ourselves while still falling under their protection."
 # === Focuses: dynamic overlord flavor ===
 CONGO_belgian_congo: "[CONGO_GetOverlordAdjective] Congo"
 CONGO_free_enterprise_fund_desc: "The [CONGO_GetOverlordAdjective] colonial administration are well aware that they need to invest in order to elicit the most from the Congo. As such they are offering financial grants to small businesses to help get them started. "
 CONGO_secure_international_funding_desc: "The [CONGO_GetOverlordAdjective] colonial authority is not the only power aware of Congo's potential. We should look to international partners for investment with whom we can do business with or without [CONGO_GetOverlordName]."
 CONGO_weapon_repair_workshops_desc: "Although most military production is handled in [CONGO_GetOverlordName], there are still a number of small time workshops who can repair and repurpose old military hardware. We should ensure they have what they need to do this, in case we need to call on this equipment in the future."
 CONGO_congo_investments_desc: "The [CONGO_GetOverlordAdjective] central government is well aware of the riches of Congo, and as such we could harness that wealth and turn it towards the further recovery of the [CONGO_GetOverlordAdjective] economy. All it will take is a little up-front investment."
 CONGO_belgian_devaluation: "[CONGO_GetOverlordAdjective] Devaluation"
 CONGO_symbiotic_industrialization_desc: "The one fuels the other, as we develop the [CONGO_GetOverlordAdjective] industry, so to does the need for resources rise. These we can import from the Congo, and fuel even more rapid industrialization, thereby needing even more resources. The prosperity of both are closely connected."
 CONGO_belgian_officer_corps: "[CONGO_GetOverlordAdjective] Officer Corps"
 CONGO_belgian_officer_corps_desc: "Currently the Force Publique is lead by a [CONGO_GetOverlordAdjective] officer cadre, however, as the Force has expanded in size, the officer corps has not grown to fit. We should request additional [CONGO_GetOverlordAdjective] staff to ensure all these new recruits are properly led."
 CONGO_fuel_for_belgium: "Fuel for [CONGO_GetOverlordNameDef]"
 CONGO_fuel_for_belgium_desc: "Our efforts to expand the resource extraction in the Congo have met with such success, that [CONGO_GetOverlordAdjective] companies unashamedly use these cheap materials to fuel their own factories in [CONGO_GetOverlordName]... and turn a significant profit while doing it."
 CONGO_antwerp_diamond_district: "[CONGO_GetOverlordDiamondCity] Diamond District"
 CONGO_antwerp_diamond_district_desc: "A welcome byproduct from being one of the premier producers of diamonds, has led to [CONGO_GetOverlordDiamondCity] becoming the primary hub for the distribution and sale of this mineral, and this in turn provides us with a very tangible source of revenue."
 CONGO_expand_metallurgical_industry_desc: "[CONGO_GetOverlordNameDefCap] has long been known for its excellent metallurgical industry, however, it did not always have the raw materials to properly thrive. Now with imported resources from the Congo, they have the means to prosper."
 CONGO_congo_free_state_desc: "The colonial administration has been so effective at thwarting any dream of freedom, that the future of the Congo is all but set- a future once again quashed under the thumb of absolute rule from [CONGO_GetOverlordSeat]."
 CONGO_overseas_department_of_belgium: "Overseas Department of [CONGO_GetOverlordNameDef]"
 CONGO_republic_of_congo_desc: "The heady air of freedom can be felt throughout the new republic. Whether the future holds a place beside that of [CONGO_GetOverlordName], or in opposition to the former colonial master, there is only one thing certain. This future is for the Congo alone to decide."
 CONGO_appoint_van_overstraeten_tt: "§YRaoul van Overstraeten§! is sent to become a §YField Marshal§! for the §Y[CONGO_GetOverlordAdjective] Congo§!"
 # === Cosmetic tag: dynamic country name for the colonial Congo ===
 COG_belgian_congo: "$OVERLORDADJ$ Congo"
 COG_belgian_congo_DEF: "The $OVERLORDADJ$ Congo"
 COG_belgian_congo_neutrality: "$OVERLORDADJ$ Congo"
 COG_belgian_congo_neutrality_DEF: "the $OVERLORDADJ$ Congo"
